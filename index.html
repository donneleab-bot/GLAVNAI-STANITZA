<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Pride Slider</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1515; }
    .slider-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; display: flex; justify-content: center; align-items: center; }
    .slide.active { opacity: 1; }
    .slide img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <div class="slider-container">

    <!-- СЛАЙД 1 -->
    <div class="slide active">
      <img src="НовыйХолст4ываываываывфывlllgfdgfgфывыфвфывыфвфывфывыфваыфвавыапфыв.png">
    </div>

    <!-- СЛАЙД 2 -->
    <div class="slide">
      <img src="НовыйХолст4ываываываывфывlllgfdgfgфывыфвфывыфвфывфывыфваыфвавыап.png">
    </div>

    <!-- СЛАЙД 3 -->
    <div class="slide">
      <img src="НовыйХолст4ываываываывфывlllgfdgfgфывыфвфывыфвфывфывыфваыфва.png" alt="Арт 3">
    </div>

    <!-- ЕСЛИ НУЖНО БОЛЬШЕ СЛАЙДОВ, ПРОСТО СКОПИРУЙ СТРОЧКИ НИЖЕ СКОЛЬКО УГОДНО РАЗ: -->
    <!-- <div class="slide"><img src="НАЗВАНИЕ_КАРТИНКИ.jpg" alt="Арт"></div> -->

  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const slideInterval = 4000; // 4 СЕКУНДЫ НА КАЖДЫЙ АРТ (МОЖНО ИЗМЕНИТЬ)

    function nextSlide() {
      slides[currentIndex].classList.remove('active');
      currentIndex = (currentIndex + 1) % slides.length;
      slides[currentIndex].classList.add('active');
    }

    setInterval(nextSlide, slideInterval);
  </script>

</body>
</html>
